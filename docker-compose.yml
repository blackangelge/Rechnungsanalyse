version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: /volume1/docker/_rechnungsanalyse/.env
    volumes:
      - /volume1/docker/_rechnungsanalyse/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    env_file: /volume1/docker/_rechnungsanalyse/.env
    environment:
      VIRTUAL_ENV: /venv
      PATH: /venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - /volume1/docker/_rechnungsanalyse/backend:/app
      - /volume1/docker/_rechnungsanalyse/python_env:/venv
      - ${IMPORT_BASE_PATH}:${IMPORT_BASE_PATH}:ro
      - ${STORAGE_PATH}:${STORAGE_PATH}
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        test -f /venv/bin/activate || python -m venv /venv &&
        /venv/bin/pip install -q -r requirements.txt &&
        /venv/bin/alembic upgrade head &&
        /venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    volumes:
      - /volume1/docker/_rechnungsanalyse/frontend:/app
      - /volume1/docker/_rechnungsanalyse/node_modules:/app/node_modules
    ports:
      - "3100:3000"
    depends_on:
      - backend
    command: sh -c "rm -rf /app/.next; mkdir -p /app/@eaDir; echo 'export default function Default() { return null; }' > /app/@eaDir/default.js; npm install --prefer-offline 2>/dev/null || npm install; npm run dev"
